<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#101820" flood-opacity="0.13"/>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#101820" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="bg" x1="160" y1="95" x2="870" y2="915" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFDFC"/>
      <stop offset="1" stop-color="#F4F1EC"/>
    </linearGradient>
    <linearGradient id="redArc" x1="183" y1="223" x2="468" y2="825" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF4A4A"/>
      <stop offset="1" stop-color="#E73333"/>
    </linearGradient>
    <linearGradient id="greenArc" x1="602" y1="222" x2="781" y2="806" gradientUnits="userSpaceOnUse">
      <stop stop-color="#91C894"/>
      <stop offset="1" stop-color="#74B978"/>
    </linearGradient>
    <linearGradient id="cardFill" x1="280" y1="330" x2="748" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8F7F4"/>
    </linearGradient>
  </defs>

  <!-- App tile -->
  <rect x="96" y="96" width="832" height="832" rx="155" fill="url(#bg)" filter="url(#softShadow)"/>
  <rect x="97.5" y="97.5" width="829" height="829" rx="153.5" stroke="#E6E2DD" stroke-opacity="0.55" stroke-width="3"/>

  <!-- Outer progress arcs -->
  <path d="M486 198C338 210 214 333 204 486C195 625 272 747 389 806C424 824 462 834 502 837"
        stroke="url(#redArc)" stroke-width="33" stroke-linecap="round"/>
  <path d="M535 198C690 207 817 339 819 499C821 635 745 755 633 816"
        stroke="url(#greenArc)" stroke-width="33" stroke-linecap="round"/>

  <!-- Residence card -->
  <g filter="url(#cardShadow)">
    <rect x="278" y="340" width="468" height="295" rx="42" fill="url(#cardFill)"/>
    <rect x="279.5" y="341.5" width="465" height="292" rx="40.5" stroke="#D9D6D1" stroke-width="3" stroke-opacity="0.65"/>
  </g>

  <!-- Pale Lisbon skyline -->
  <g opacity="0.22" fill="#9AA3AA">
    <rect x="590" y="523" width="170" height="96" rx="4"/>
    <path d="M612 523V490L625 476L638 490V523H612Z"/>
    <path d="M659 523V488C659 466 677 449 699 449C721 449 739 466 739 488V523H659Z"/>
    <path d="M725 523V438H775V523H725Z"/>
    <rect x="737" y="414" width="26" height="24" rx="2"/>
    <rect x="729" y="431" width="11" height="17"/>
    <rect x="760" y="431" width="11" height="17"/>
  </g>

  <!-- Portuguese-style shield -->
  <g stroke="#253036" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
    <path d="M326 404H456V513C456 550 430 582 391 598C352 582 326 550 326 513V404Z"/>
  </g>
  <g fill="#253036">
    <path d="M382 424H407V451C407 462 396 470 394 471C392 470 382 462 382 451V424Z"/>
    <path d="M347 469H372V496C372 507 361 515 359 516C357 515 347 507 347 496V469Z"/>
    <path d="M418 469H443V496C443 507 432 515 430 516C428 515 418 507 418 496V469Z"/>
    <path d="M382 469H407V496C407 507 396 515 394 516C392 515 382 507 382 496V469Z"/>
    <path d="M382 522H407V549C407 560 396 568 394 569C392 568 382 560 382 549V522Z"/>
  </g>
  <g fill="#FFFFFF" opacity="0.85">
    <circle cx="391" cy="438" r="2.8"/><circle cx="398" cy="438" r="2.8"/><circle cx="394.5" cy="446" r="2.8"/>
    <circle cx="356" cy="483" r="2.8"/><circle cx="363" cy="483" r="2.8"/><circle cx="359.5" cy="491" r="2.8"/>
    <circle cx="427" cy="483" r="2.8"/><circle cx="434" cy="483" r="2.8"/><circle cx="430.5" cy="491" r="2.8"/>
    <circle cx="391" cy="483" r="2.8"/><circle cx="398" cy="483" r="2.8"/><circle cx="394.5" cy="491" r="2.8"/>
    <circle cx="391" cy="536" r="2.8"/><circle cx="398" cy="536" r="2.8"/><circle cx="394.5" cy="544" r="2.8"/>
  </g>

  <!-- Abstract text lines -->
  <rect x="520" y="423" width="202" height="20" rx="10" fill="#D8D9D8"/>
  <rect x="520" y="485" width="158" height="20" rx="10" fill="#D8D9D8"/>

  <!-- Circular badge -->
  <g filter="url(#cardShadow)">
    <circle cx="512" cy="666" r="105" fill="#FBFAF8"/>
    <circle cx="512" cy="666" r="93" stroke="#253036" stroke-width="14"/>
  </g>

  <!-- Entry/exit arrows -->
  <g stroke="#253036" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <path d="M458 642H554"/>
    <path d="M532 615L562 642L532 669"/>
    <path d="M566 697H470"/>
    <path d="M492 670L462 697L492 724"/>
  </g>
</svg>
